version: '3.8'

services:
  postgres-keycloak:
    image: postgres:16
    container_name: solavie-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 3s
      timeout: 3s
      retries: 10

  keycloak:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: solavie-keycloak
    command: start --optimized
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: ${DOMAIN:-localhost}
      KC_HOSTNAME_PORT: "${KEYCLOAK_PORT:-8081}"
      KC_PROXY_HEADERS: xforwarded
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KC_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy

  auth-sync-worker:
    image: python:3.11-alpine
    container_name: solavie-auth-sync-worker
    volumes:
      - ./services/auth/scripts:/app
    command: sh -c "pip install redis requests && python /app/sync_worker.py"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_URL: http://keycloak:8080
      KC_ADMIN: ${KC_ADMIN}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: solavie-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  init-gateway:
    image: python:3.11-alpine
    container_name: solavie-init-gateway
    volumes:
      - ./services/gateway/generate_kong_config.py:/app/generate_kong_config.py
      - kong_config:/etc/kong
    command: sh -c "pip install requests pyyaml && python /app/generate_kong_config.py"
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KONG_ISSUER_URL: ${KONG_ISSUER_URL:-http://localhost:8081/realms/tenant-test-uuid}
      TENANT_ID: ${DEFAULT_TENANT_ID:-tenant-test-uuid}
      RATE_LIMIT_MINUTE: ${RATE_LIMIT_MINUTE:-200}
      RATE_LIMIT_HOUR: ${RATE_LIMIT_HOUR:-5000}
    depends_on:
      keycloak:
        condition: service_started

  kong:
    image: kong/kong-gateway:3.7.1.2-ubuntu
    container_name: solavie-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_LOG_LEVEL: info
      KONG_PLUGINS: bundled,dynamic-policy

    ports:
      - "${KONG_HTTP_PORT:-8000}:8000"
      - "${KONG_HTTPS_PORT:-8443}:8443"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - kong_config:/etc/kong
      - ./services/gateway/plugins/dynamic-policy:/usr/local/share/lua/5.1/kong/plugins/dynamic-policy
    depends_on:
      redis:
        condition: service_healthy
      init-gateway:
        condition: service_completed_successfully

  ai-core:
    build:
      context: ./services/ai-core
      dockerfile: Dockerfile
    container_name: solavie-ai-core
    environment:
      - ENVIRONMENT=development
      - AI_CORE_DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-keycloak:5432/postgres
      - REDIS_URL=redis://redis:6379/1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    ports:
      - "8002:8000"
      - "50051:50051"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  kong_config:
