version: '3.8'

services:
  postgres-db:
    image: postgres:16
    container_name: solavie-postgres
    command: postgres -c max_connections=300
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KONG_DB_PASSWORD: ${KONG_DB_PASSWORD}
      USER_SERVICE_DB_PASSWORD: ${USER_SERVICE_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
      - ./scripts/init-databases.template.sql:/scripts/init-databases.template.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 3s
      timeout: 3s
      retries: 10

  keycloak:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: solavie-keycloak
    command: start --optimized
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-db:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_DB_POOL_MAX_SIZE: 150
      KC_DB_POOL_INITIAL_SIZE: 50
      KC_DB_POOL_MIN_SIZE: 30
      KC_HTTP_MAX_QUEUED_REQUESTS: 10000
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: ${DOMAIN:-localhost}
      KC_HOSTNAME_PORT: "${KEYCLOAK_PORT:-8081}"
      KC_PROXY_HEADERS: xforwarded
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_FEATURES: organization
      KEYCLOAK_ADMIN: ${KC_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
      - "9000:9000"
    depends_on:
      postgres-db:
        condition: service_healthy

  auth-sync-worker:
    image: python:3.11-alpine
    container_name: solavie-auth-sync-worker
    volumes:
      - ./services/auth/scripts:/app
    command: sh -c "pip install redis requests && python /app/sync_worker.py"
    environment:
      REDIS_HOST: redis-master-1
      REDIS_PORT: 6379
      KEYCLOAK_URL: http://keycloak:8080
      KC_ADMIN: ${KC_ADMIN}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    depends_on:
      redis-master-1:
        condition: service_healthy
      keycloak:
        condition: service_started

  redis-master-1:
    image: redis:7-alpine
    container_name: solavie-redis-master-1
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "6389:6379"
    volumes:
      - redis_master_1_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 3s
      timeout: 3s
      retries: 5

  redis-master-2:
    image: redis:7-alpine
    container_name: solavie-redis-master-2
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_master_2_data:/data

  redis-master-3:
    image: redis:7-alpine
    container_name: solavie-redis-master-3
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "6381:6379"
    volumes:
      - redis_master_3_data:/data

  redis-replica-1:
    image: redis:7-alpine
    container_name: solavie-redis-replica-1
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "6382:6379"
    volumes:
      - redis_replica_1_data:/data

  redis-replica-2:
    image: redis:7-alpine
    container_name: solavie-redis-replica-2
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "6383:6379"
    volumes:
      - redis_replica_2_data:/data

  redis-replica-3:
    image: redis:7-alpine
    container_name: solavie-redis-replica-3
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "6384:6379"
    volumes:
      - redis_replica_3_data:/data

  redis-cluster-creator:
    image: redis:7-alpine
    container_name: solavie-redis-cluster-creator
    command: >
      sh -c " sleep 5 && redis-cli --cluster create redis-master-1:6379 redis-master-2:6379 redis-master-3:6379 redis-replica-1:6379 redis-replica-2:6379 redis-replica-3:6379 --cluster-replicas 1 --cluster-yes "
    depends_on:
      - redis-master-1
      - redis-master-2
      - redis-master-3
      - redis-replica-1
      - redis-replica-2
      - redis-replica-3

  init-gateway:
    image: python:3.11-alpine
    container_name: solavie-init-gateway
    volumes:
      - ./services/gateway/generate_kong_config.py:/app/generate_kong_config.py
      - ./services/auth:/auth
      - kong_config:/etc/kong
    command: sh -c "pip install requests pyyaml && python /auth/scripts/provision_organization.py --keycloak-url http://keycloak:8080 --tenant-id $${DEFAULT_TENANT_ID:-tenant-test-uuid} --tenant-name 'Default Tenant' --admin-email admin@solavie.com --template-path /auth/templates/solavie-realm-template.json && python /app/generate_kong_config.py"
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      KONG_ISSUER_URL: ${KONG_ISSUER_URL:-http://localhost:8081/realms/solavie}
      TENANT_ID: ${DEFAULT_TENANT_ID:-tenant-test-uuid}
      RATE_LIMIT_MINUTE: ${RATE_LIMIT_MINUTE:-200}
      RATE_LIMIT_HOUR: ${RATE_LIMIT_HOUR:-5000}
      KC_ADMIN: ${KC_ADMIN}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      REDIS_HOST: ${REDIS_INTERNAL_HOST:-redis-master-1}
      REDIS_PORT: ${REDIS_INTERNAL_PORT:-6379}
      CHANNEL_CONNECTOR_URL: ${CHANNEL_CONNECTOR_INTERNAL_URL:-http://channel-connector:3001}
      MOCK_API_INTERNAL_URL: ${MOCK_API_INTERNAL_URL:-http://127.0.0.1:80}
      GATEWAY_FALLBACK_TARGET: ${GATEWAY_FALLBACK_TARGET:-127.0.0.1:8000}
      GATEWAY_SIGNING_SECRET: ${GATEWAY_SIGNING_SECRET}
    depends_on:
      keycloak:
        condition: service_started

  kong:
    image: kong/kong-gateway:3.7.1.2-ubuntu
    container_name: solavie-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_LOG_LEVEL: info
      KONG_PLUGINS: bundled,dynamic-policy
      GATEWAY_SIGNING_SECRET: ${GATEWAY_SIGNING_SECRET}
      KONG_MASTER_REALM_TENANT_ID: ${KONG_MASTER_REALM_TENANT_ID:-solavie-system-master}
      KONG_NGINX_HTTP_LUA_SHARED_DICT: "perm_cache 10m; lua_shared_dict circuit_state 1m"
      KONG_NGINX_PROXY_PROXY_PASS_HEADER: X-Accel-Buffering
      TENANT_CONFIG_INTERNAL_URL: ${TENANT_CONFIG_INTERNAL_URL:-http://tenant-config:3006}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-tenant-test-uuid}
      DEFAULT_RATE_LIMIT_MINUTE: ${RATE_LIMIT_MINUTE:-200}
      DEFAULT_RATE_LIMIT_HOUR: ${RATE_LIMIT_HOUR:-5000}
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000"
      - "${KONG_HTTPS_PORT:-8443}:8443"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - kong_config:/etc/kong
      - ./services/gateway/plugins/dynamic-policy:/usr/local/share/lua/5.1/kong/plugins/dynamic-policy
    depends_on:
      redis-master-1:
        condition: service_healthy
      init-gateway:
        condition: service_completed_successfully
    extra_hosts:
      - "tenant-config:10.255.255.1"

  gateway-sync:
    image: python:3.11-alpine
    container_name: solavie-gateway-sync
    volumes:
      - ./services/gateway:/app
      - kong_config:/etc/kong
    command: sh -c "pip install redis requests pyyaml && python /app/sync_registry.py"
    environment:
      REDIS_HOST: ${REDIS_INTERNAL_HOST:-redis-master-1}
      REDIS_PORT: ${REDIS_INTERNAL_PORT:-6379}
      KONG_ADMIN_URL: http://solavie-gateway:8001
      KONG_CONFIG_PATH: /etc/kong/kong.yml
      PYTHONUNBUFFERED: "1"
      GATEWAY_FALLBACK_TARGET: ${GATEWAY_FALLBACK_TARGET:-127.0.0.1:8000}
      REGISTRY_SYNC_POLL_INTERVAL: ${REGISTRY_SYNC_POLL_INTERVAL:-5}
    depends_on:
      kong:
        condition: service_started
      redis-master-1:
        condition: service_healthy

  ai-core:
    build:
      context: ./services/ai-core
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=development
      - AI_CORE_DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres-db:5432/postgres
      - REDIS_URL=redis://redis-master-1:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - WATCHFILES_FORCE_POLLING=true
      - GATEWAY_SIGNING_SECRET=${GATEWAY_SIGNING_SECRET}
    volumes:
      - ./services/ai-core:/app
    command: sh -c "python -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. proto/ai_core.proto && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-master-1:
        condition: service_healthy

  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
      target: builder
    container_name: solavie-user-service
    command: npm run start:dev
    volumes:
      - ./services/user:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=3008
      - DATABASE_URL=postgresql://solavie_user:${USER_SERVICE_DB_PASSWORD:-solavie_user_password}@postgres-db:5432/solavie_user_db?schema=public
      - REDIS_HOST=redis-master-1
      - REDIS_PORT=6379
      - KEYCLOAK_URL=http://keycloak:8080
      - KC_ADMIN=${KC_ADMIN}
      - KC_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD}
      - KEYCLOAK_WEBHOOK_SECRET=webhook_shared_secret
      - DASHBOARD_URL=http://localhost:3000
      - GATEWAY_SIGNING_SECRET=${GATEWAY_SIGNING_SECRET}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SDK_DISABLED=true
    ports:
      - "3008:3008"
      - "50058:50058"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-master-1:
        condition: service_healthy
      keycloak:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4:8.9
    container_name: solavie-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@solavie.com
      PGADMIN_DEFAULT_PASSWORD: admin_secret_pass
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    ports:
      - "5050:80"
    volumes:
      - ./scripts/pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      postgres-db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_master_1_data:
  redis_master_2_data:
  redis_master_3_data:
  redis_replica_1_data:
  redis_replica_2_data:
  redis_replica_3_data:
  kong_config:
