_format_version: "3.0"
_transform: true

services:
  # Mock upstream for testing Auth service directly via Gateway
  - name: auth-service
    url: http://keycloak:8080
    routes:
      - name: auth-route
        paths: ["/api/v1/auth"]
        strip_path: true

  # AI Core (Phase 1)
  - name: ai-core
    url: http://ai-core:8005
    routes:
      - name: ai-api
        paths: ["/api/v1/completions", "/api/v1/embeddings", "/api/v1/models"]
        strip_path: true

  # Knowledge Base (Phase 1)
  - name: knowledge-base
    url: http://knowledge-base:8004
    routes:
      - name: kb-api
        paths: ["/api/v1/documents", "/api/v1/search"]
        strip_path: true

  # Chatbot (Phase 2)
  - name: chatbot
    url: http://chatbot:8001
    routes:
      - name: chatbot-api
        paths: ["/api/v1/chatbot"]
        strip_path: true

  # Messaging Webhooks (No Auth)
  - name: channel-connector-webhooks
    url: http://channel-connector:3001
    routes:
      - name: webhooks
        paths: ["/webhooks"]
        strip_path: false

plugins:
  # Global JWT validation with Keycloak integration
  - name: jwt-keycloak
    config:
      # Keycloak instance base URI
      allowed_issuers: ["http://localhost:8081/realms/tenant-test-uuid"]
      well_known_template: "http://keycloak:8080/realms/%s/.well-known/openid-configuration"
    route: null

  - name: rate-limiting
    config:
      policy: redis
      redis:
        host: redis
        port: 6379
      limit_by: header
      header_name: X-Tenant-ID
      minute: 200
      hour: 5000

  - name: cors
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers: ["Authorization", "Content-Type", "X-Tenant-ID"]
      credentials: true
      max_age: 3600

  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
